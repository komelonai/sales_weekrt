<head>

<title>미팅관리대장 | 해외영업팀 주간보고</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Malgun Gothic','맑은 고딕','Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#f0f2f5;color:#1e293b;font-size:17px;line-height:1.6;}
.site-header{background:#0f2952;color:white;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:48px;}
.site-logo{font-size:19px;font-weight:600;}
.site-nav{background:white;border-bottom:1px solid #e2e8f0;display:flex;overflow-x:auto;}
.site-nav a{display:inline-flex;align-items:center;padding:10px 14px;font-size:14px;color:#64748b;text-decoration:none;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.15s;}
.site-nav a:hover{color:#0f2952;background:#f8fafc;}
.site-nav a.active{color:#0f2952;border-bottom-color:#0f2952;font-weight:500;}
.main{padding:14px 20px 80px;max-width:1700px;margin:0 auto;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.page-title{font-size:22px;font-weight:700;color:#0f2952;}

/* Region tabs */
.region-tabs{display:flex;margin-bottom:16px;background:white;border-radius:8px;border:1px solid #e2e8f0;overflow:hidden;width:fit-content;}
.rtab{padding:9px 28px;font-size:13px;cursor:pointer;border:none;background:transparent;color:#64748b;font-weight:500;transition:all 0.15s;}
.rtab:hover{background:#f8fafc;color:#0f2952;}
.rtab.active{background:#0f2952;color:white;}

/* KPI row */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:12px;}
.kpi-card{background:white;border-radius:10px;border:1px solid #e2e8f0;padding:11px 14px;}
.kpi-label{font-size:16px;color:#64748b;font-weight:500;margin-bottom:2px;}
.kpi-value{font-size:24px;font-weight:700;color:#0f2952;}
.kpi-sub{font-size:12px;color:#94a3b8;margin-top:1px;}

/* Card */
.card{background:white;border-radius:10px;border:1px solid #e2e8f0;margin-bottom:12px;overflow:hidden;}
.card-header{padding:8px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #f1f5f9;background:#fafbfc;flex-wrap:wrap;gap:8px;}
.card-title{font-size:19px;font-weight:700;color:#0f2952;}

/* Controls row */
.controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.ctrl-btn{padding:5px 12px;border-radius:5px;font-size:12px;cursor:pointer;border:1px solid #e2e8f0;background:white;color:#374151;transition:all 0.12s;}
.ctrl-btn:hover,.ctrl-btn.active{background:#0f2952;color:white;border-color:#0f2952;}
select.ctrl-sel{padding:5px 8px;border-radius:5px;font-size:12px;border:1px solid #e2e8f0;background:white;color:#374151;cursor:pointer;}

/* Calendar table */
.tbl-wrap{overflow-x:auto;}
.meeting-tbl{border-collapse:collapse;font-size:15px;}
.meeting-tbl th{background:#f3f6fb;padding:7px 5px;font-weight:500;color:#374151;border:1px solid #e2e8f0;text-align:center;white-space:nowrap;}
.meeting-tbl th.co-hd{min-width:130px;text-align:left;padding-left:14px;position:sticky;left:0;z-index:2;background:#f3f6fb;}
.meeting-tbl th.yr-hd{background:#0f2952;color:white;font-size:11px;padding:5px 8px;}
.meeting-tbl th.mo-hd{min-width:58px;font-size:11px;color:#64748b;}

.meeting-tbl td{border:1px solid #f0f2f5;text-align:center;vertical-align:middle;padding:0;}
.meeting-tbl td.co-cell{text-align:left;padding:0 6px 0 14px;font-weight:500;color:#1e293b;background:#fafbfc;border-right:2px solid #e2e8f0;border-bottom:1px solid #f0f2f5;white-space:nowrap;position:sticky;left:0;z-index:1;}
.meeting-tbl td.total-cell{background:#f3f6fb;font-weight:600;color:#64748b;font-size:11px;padding:6px 4px;}
.meeting-tbl td.total-cell.has{color:#0f2952;}

/* Meeting cells */
.m-cell{width:58px;height:48px;cursor:pointer;position:relative;transition:filter 0.12s;}
.m-cell:hover{filter:brightness(0.92);}
.m-cell.empty{background:white;}
.m-cell.empty:hover{background:#f8fafc;}
.m-cell.empty .plus{display:none;font-size:16px;color:#cbd5e1;line-height:48px;}
.m-cell.empty:hover .plus{display:block;}
.m-cell.readonly{cursor:default;}
.m-cell.readonly:hover{filter:none;}

/* Method colors — done */
.m-cell.done-call  {background:#dbeafe;}
.m-cell.done-visit {background:#dcfce7;}
.m-cell.done-expo  {background:#fef3c7;}
.m-cell.done-hq    {background:#ede9fe;}
.m-cell.done-other {background:#f1f5f9;}

/* Method colors — plan */
.m-cell.plan-call  {background:#eff6ff;border:1.5px dashed #93c5fd!important;}
.m-cell.plan-visit {background:#f0fdf4;border:1.5px dashed #86efac!important;}
.m-cell.plan-expo  {background:#fffbeb;border:1.5px dashed #fcd34d!important;}
.m-cell.plan-hq    {background:#f5f3ff;border:1.5px dashed #c4b5fd!important;}
.m-cell.plan-other {background:#f8fafc;border:1.5px dashed #cbd5e1!important;}

.m-cell .day{font-size:13px;font-weight:600;color:#1e293b;line-height:1;}
.m-cell .mth{font-size:10px;color:#64748b;margin-top:2px;font-weight:400;}
.m-cell.done-call .day,.m-cell.done-visit .day,.m-cell.done-expo .day,
.m-cell.done-hq .day,.m-cell.done-other .day{color:#0f2952;}
.m-cell-inner{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;width:100%;}

/* Legend */
.legend{display:flex;gap:14px;align-items:center;font-size:11px;color:#64748b;padding:10px 18px;border-top:1px solid #f1f5f9;flex-wrap:wrap;}
.lg{display:flex;align-items:center;gap:5px;}
.lg-dot{width:14px;height:14px;border-radius:3px;flex-shrink:0;}

/* Add row */
.add-row-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 16px;border-radius:6px;font-size:12px;cursor:pointer;border:1px dashed #cbd5e1;background:transparent;color:#64748b;margin:10px 18px;transition:all 0.15s;}
.add-row-btn:hover{border-color:#0f2952;color:#0f2952;}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,41,82,0.35);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:white;border-radius:14px;padding:24px 28px;width:360px;box-shadow:0 12px 40px rgba(0,0,0,0.18);}
.modal-title{font-size:15px;font-weight:600;color:#0f2952;margin-bottom:4px;}
.modal-sub{font-size:12px;color:#94a3b8;margin-bottom:18px;}
.form-row{margin-bottom:14px;}
.form-label{font-size:11px;font-weight:600;color:#374151;margin-bottom:5px;display:block;}
.form-input{width:100%;padding:8px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;color:#1e293b;outline:none;transition:border 0.12s;}
.form-input:focus{border-color:#0f2952;}
.method-btns{display:flex;gap:6px;flex-wrap:wrap;}
.method-btn{padding:5px 12px;border-radius:5px;font-size:12px;cursor:pointer;border:1.5px solid #e2e8f0;background:white;color:#374151;transition:all 0.12s;font-weight:500;}
.method-btn:hover{border-color:#94a3b8;}
.method-btn.sel-call{background:#dbeafe;border-color:#2563eb;color:#1d4ed8;}
.method-btn.sel-visit{background:#dcfce7;border-color:#16a34a;color:#15803d;}
.method-btn.sel-expo{background:#fef3c7;border-color:#d97706;color:#92400e;}
.method-btn.sel-hq{background:#ede9fe;border-color:#7c3aed;color:#6d28d9;}
.method-btn.sel-other{background:#f1f5f9;border-color:#64748b;color:#374151;}
.done-toggle{display:flex;gap:0;border:1px solid #e2e8f0;border-radius:6px;overflow:hidden;}
.done-btn{flex:1;padding:7px;font-size:12px;cursor:pointer;border:none;background:white;color:#64748b;transition:all 0.12s;}
.done-btn.active-done{background:#0f2952;color:white;}
.done-btn.active-plan{background:#d97706;color:white;}
.modal-footer{display:flex;gap:8px;margin-top:20px;}
.modal-btn{flex:1;padding:9px;border-radius:7px;font-size:13px;cursor:pointer;font-weight:500;border:1px solid #e2e8f0;background:white;color:#374151;transition:all 0.12s;}
.modal-btn:hover{background:#f3f4f6;}
.modal-btn.primary{background:#0f2952;color:white;border-color:#0f2952;}
.modal-btn.primary:hover{background:#0c2347;}
.modal-btn.danger{color:#dc2626;border-color:#fecaca;}
.modal-btn.danger:hover{background:#fef2f2;}

/* Save bar */
.save-bar{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #e2e8f0;padding:10px 24px;display:flex;align-items:center;justify-content:space-between;z-index:100;box-shadow:0 -2px 8px rgba(0,0,0,0.06);}
.save-status{font-size:12px;color:#94a3b8;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid #e2e8f0;background:white;color:#374151;transition:all 0.15s;}
.btn:hover{background:#f3f4f6;}
.btn-primary{background:#0f2952;color:white;border-color:#0f2952;padding:8px 20px;font-size:13px;font-weight:500;}
.btn-primary:hover{background:#0c2347;}
@media print{.site-header,.site-nav,.save-bar,.print-btns,.region-actions,.meeting-actions{display:none!important;}body{background:white!important;}.main{padding:10px!important;max-width:none!important;}.region-card{break-inside:avoid;}}
</style>

</head>

/* ── Init UI ── */
function initYearButtons() {
  document.getElementById('yearControls').innerHTML =
    `<button class="ctrl-btn" id="btnPrev" onclick="setYear(${PREV_YEAR})">${PREV_YEAR}년</button>` +
    `<button class="ctrl-btn" id="btnCur"  onclick="setYear(${CUR_YEAR})">${CUR_YEAR}년</button>` +
    `<button class="ctrl-btn active" id="btnBoth" onclick="setYear('both')">전체</button>`;
}

function initHistorySelect() {
  const sel = document.getElementById('historySelect');
  for (let y = CUR_YEAR - 2; y >= 2023; y--) {
    const opt = document.createElement('option');
    opt.value = y; opt.textContent = y + '년';
    sel.appendChild(opt);
  }
}

/* ── Region / Year ── */
function switchRegion(region, btn) {
  currentRegion = region;
  document.querySelectorAll('.rtab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function setYear(y) {
  yearFilter = y;
  ['btnPrev','btnCur','btnBoth'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.remove('active');
  });
  const map = { [PREV_YEAR]: 'btnPrev', [CUR_YEAR]: 'btnCur', both: 'btnBoth' };
  const btn = document.getElementById(map[y]);
  if (btn) btn.classList.add('active');
  render();
}

/* ── History ── */
async function loadHistory(yearStr) {
  if (!yearStr) {
    await reloadCurrent();
    return;
  }
  const yr = parseInt(yearStr);
  const ds = createDataStore('page8_' + yr);
  const saved = await ds.load().catch(() => null);
  if (!saved || (!saved.japan?.length && !saved.europe?.length)) {
    alert(yr + '년 저장된 데이터가 없습니다.');
    document.getElementById('historySelect').value = '';
    return;
  }
  data = {
    japan:  (saved.japan  || []).map(co => ({ name: co.name, meetings: { [yr]: co.meetings || [] } })),
    europe: (saved.europe || []).map(co => ({ name: co.name, meetings: { [yr]: co.meetings || [] } }))
  };
  yearFilter = yr;
  isReadOnly = true;
  updateReadOnlyUI();
  render();
}

async function reloadCurrent() {
  document.getElementById('historySelect').value = '';
  isReadOnly = false;
  yearFilter = 'both';
  await loadAll();
  updateReadOnlyUI();
  setYear('both');
}

function updateReadOnlyUI() {
  document.getElementById('readOnlyBadge').style.display = isReadOnly ? '' : 'none';
  document.getElementById('addRowBtn').style.display     = isReadOnly ? 'none' : '';
  document.getElementById('saveBar').style.display       = isReadOnly ? 'none' : '';
}

/* ── Data helpers ── */
function extractYearData(src, year) {
  const result = { japan: [], europe: [] };
  ['japan','europe'].forEach(region => {
    result[region] = (src[region] || []).map(co => ({
      name: co.name,
      meetings: co.meetings?.[year] || []
    }));
  });
  return result;
}

function mergeYearData(prevSaved, curSaved) {
  const result = { japan: [], europe: [] };
  ['japan','europe'].forEach(region => {
    const map = {};
    (prevSaved[region] || []).forEach(co => {
      map[co.name] = { name: co.name, meetings: { [PREV_YEAR]: co.meetings || [], [CUR_YEAR]: [] } };
    });
    (curSaved[region] || []).forEach(co => {
      if (map[co.name]) {
        map[co.name].meetings[CUR_YEAR] = co.meetings || [];
      } else {
        map[co.name] = { name: co.name, meetings: { [PREV_YEAR]: [], [CUR_YEAR]: co.meetings || [] } };
      }
    });
    result[region] = Object.values(map);
  });
  return result;
}

/* ── Migration from legacy page8 ── */
async function migrateLegacyIfNeeded() {
  const curCheck = await DS_cur.load().catch(() => null);
  if (curCheck?.japan?.length || curCheck?.europe?.length) return;
  const legacy = await createDataStore('page8').load().catch(() => null);
  if (!legacy) return;
  const sample = (legacy.japan || legacy.europe || [])[0]?.meetings;
  if (!sample || Array.isArray(sample)) return; // not old format
  await Promise.all([
    DS_cur.save(extractYearData(legacy, CUR_YEAR)),
    DS_prev.save(extractYearData(legacy, PREV_YEAR))
  ]);
}

/* ── Persist ── */
async function loadAll() {
  const [cur, prev] = await Promise.all([
    DS_cur.load().catch(() => null),
    DS_prev.load().catch(() => null)
  ]);
  const curD  = (cur  && (cur.japan?.length  || cur.europe?.length))  ? cur  : { japan: [], europe: [] };
  const prevD = (prev && (prev.japan?.length || prev.europe?.length)) ? prev : { japan: [], europe: [] };
  if (curD.japan.length || curD.europe.length || prevD.japan.length || prevD.europe.length) {
    data = mergeYearData(prevD, curD);
  }
}

async function saveAll() {
  if (isReadOnly) return;
  document.getElementById('saveStatus').textContent = '저장 중...';
  try {
    await Promise.all([
      DS_cur.save(extractYearData(data, CUR_YEAR)),
      DS_prev.save(extractYearData(data, PREV_YEAR))
    ]);
    document.getElementById('saveStatus').textContent = '저장 완료 · ' + new Date().toLocaleTimeString('ko-KR');
  } catch(e) {
    document.getElementById('saveStatus').textContent = '저장 실패 — 다시 시도';
  }
}

async function clearRegion() {
  if (!confirm('현재 탭(' + (currentRegion==='japan'?'일본':'유럽') + ') 데이터를 초기화하시겠습니까?')) return;
  data[currentRegion] = [];
  await saveAll();
  render();
}

function markChanged() {
  document.getElementById('saveStatus').textContent = '저장되지 않은 변경사항';
}

/* ── Render ── */
function render() {
  const companies = data[currentRegion];
  document.getElementById('calTitle').textContent = currentRegion === 'japan'
    ? '일본 거래선 미팅 관리대장' : '유럽/일반지역 핵심거래선 미팅 관리대장';
  renderKPI(companies);
  renderCalendar(companies);
}

function renderKPI(companies) {
  if (isReadOnly) {
    const yr = yearFilter;
    let done=0, plan=0;
    const methods = {};
    companies.forEach(c => {
      done += (c.meetings[yr]||[]).filter(m=>m.done).length;
      plan += (c.meetings[yr]||[]).filter(m=>!m.done).length;
      (c.meetings[yr]||[]).forEach(m => { const k=m.method||'기타'; methods[k]=(methods[k]||0)+1; });
    });
    const top = Object.entries(methods).sort((a,b)=>b[1]-a[1])[0];
    document.getElementById('kpiRow').innerHTML = `
      <div class="kpi-card"><div class="kpi-label">${yr}년 미팅 완료</div><div style="display:inline-flex;align-items:baseline;gap:5px;"><div class="kpi-value">${done}회</div><span class="kpi-sub">(${companies.length}개 거래처)</span></div></div>
      <div class="kpi-card"><div class="kpi-label">${yr}년 예정 미팅</div><div style="display:inline-flex;align-items:baseline;gap:5px;"><div class="kpi-value" style="color:#d97706;">${plan}회</div><span class="kpi-sub">(스케줄 확정)</span></div></div>
      <div class="kpi-card"><div class="kpi-label">주요 미팅 방식</div><div style="display:inline-flex;align-items:baseline;gap:5px;"><div class="kpi-value" style="font-size:17px;">${top?top[0]:'-'}</div><span class="kpi-sub">${top?'('+top[1]+'회)':''}</span></div></div>
      <div class="kpi-card"><div class="kpi-label">거래처 수</div><div class="kpi-value">${companies.length}개</div></div>`;
    return;
  }
  let donePrev=0, doneCur=0, planCur=0;
  const methods = {};
  companies.forEach(c => {
    donePrev += (c.meetings[PREV_YEAR]||[]).filter(m=>m.done).length;
    doneCur  += (c.meetings[CUR_YEAR] ||[]).filter(m=>m.done).length;
    planCur  += (c.meetings[CUR_YEAR] ||[]).filter(m=>!m.done).length;
    (c.meetings[CUR_YEAR]||[]).forEach(m => { const k=m.method||'기타'; methods[k]=(methods[k]||0)+1; });
  });
  const top = Object.entries(methods).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('kpiRow').innerHTML = `
  <div class="kpi-card"><div class="kpi-label">${PREV_YEAR}년 미팅 완료</div><div style="display:inline-flex;align-items:baseline;gap:5px;"><div class="kpi-value">${donePrev}회</div><span class="kpi-sub">(${companies.length}개 거래처)</span></div></div>
  <div class="kpi-card"><div class="kpi-label">${CUR_YEAR}년 미팅 완료</div><div style="display:inline-flex;align-items:baseline;gap:5px;"><div class="kpi-value" style="color:#0f2952;">${doneCur}회</div><span class="kpi-sub">(현재까지)</span></div></div>
  <div class="kpi-card"><div class="kpi-label">${CUR_YEAR}년 예정 미팅</div><div style="display:inline-flex;align-items:baseline;gap:5px;"><div class="kpi-value" style="color:#d97706;">${planCur}회</div><span class="kpi-sub">(스케줄 확정)</span></div></div>
  <div class="kpi-card"><div class="kpi-label">주요 미팅 방식</div><div style="display:inline-flex;align-items:baseline;gap:5px;"><div class="kpi-value" style="font-size:17px;">${top?top[0]:'-'}</div><span class="kpi-sub">${top?'('+top[1]+'회)':''}</span></div></div>`;
}

function methodClass(method, done) {
  if (!method) return done ? 'done-other' : 'plan-other';
  const type = method.includes('화상')?'call':method.includes('출장')?'visit':method.includes('전시')?'expo':method.includes('본사')?'hq':'other';
  return (done?'done-':'plan-')+type;
}

function renderCalendar(companies) {
  const years = yearFilter === 'both' ? [PREV_YEAR, CUR_YEAR] : [yearFilter];

  let html = '<table class="meeting-tbl"><thead><tr>';
  html += '<th class="co-hd" rowspan="2">거래처</th>';
  years.forEach(yr => html += `<th class="yr-hd" colspan="12">${yr}년</th>`);
  html += '</tr><tr>';
  years.forEach(() => MONTHS.forEach(m => html += `<th class="mo-hd">${m}</th>`));
  html += '</tr></thead><tbody>';

  companies.forEach((co, ci) => {
    const nameCell = isReadOnly
      ? `<td class="co-cell">${co.name}</td>`
      : `<td class="co-cell" onclick="openNameEdit(${ci})" title="클릭하여 이름 수정" style="cursor:pointer;">${co.name}</td>`;
    html += `<tr>${nameCell}`;
    years.forEach(yr => {
      MONTHS.forEach((_, mi) => {
        const mo = mi + 1;
        const entry = (co.meetings[yr]||[]).find(m => m.m === mo);
        if (entry) {
          const cls = methodClass(entry.method, entry.done);
          const dayTxt = entry.d ? String(entry.d) : '';
          const tooltip = `${co.name} · ${yr}년 ${mo}월${dayTxt?' '+dayTxt+'일':''} · ${entry.method||''} · ${entry.done?'완료':'예정'}`;
          const click = isReadOnly ? `class="m-cell ${cls} readonly" title="${tooltip}"`
                                   : `class="m-cell ${cls}" onclick="openModal(${ci},${yr},${mo})" title="${tooltip}"`;
          html += `<td style="padding:0;"><div ${click}><div class="m-cell-inner">
            <div class="day">${dayTxt||'·'}</div>
            <div class="mth">${entry.method?entry.method.substring(0,2):''}</div>
          </div></div></td>`;
        } else {
          const click = isReadOnly ? `class="m-cell empty readonly"`
                                   : `class="m-cell empty" onclick="openModal(${ci},${yr},${mo},true)"`;
          html += `<td style="padding:0;"><div ${click}><div class="m-cell-inner">
            <div class="plus">${isReadOnly?'':'+' }</div>
          </div></div></td>`;
        }
      });
    });
    html += '</tr>';
  });

  html += '<tr><td class="co-cell total-cell" style="font-weight:600;">월간 합계</td>';
  years.forEach(yr => {
    MONTHS.forEach((_, mi) => {
      const mo = mi + 1;
      const cnt = companies.reduce((s,c) => s+(c.meetings[yr]||[]).filter(m=>m.m===mo).length, 0);
      html += `<td class="total-cell${cnt?' has':''}"><div class="m-cell-inner" style="height:32px;">${cnt||''}</div></td>`;
    });
  });
  html += '</tr></tbody></table>';
  document.getElementById('calendarTable').innerHTML = html;
}

/* ── Modal ── */
function openModal(ci, year, month, isNew=false) {
  if (isReadOnly) return;
  const co = data[currentRegion][ci];
  const entry = !isNew ? (co.meetings[year]||[]).find(m=>m.m===month) : null;
  modal = { ci, year, month, isNew: isNew || !entry };

  document.getElementById('modalTitle').textContent = co.name;
  document.getElementById('modalSub').textContent = `${year}년 ${MONTHS[month-1]}`;
  document.getElementById('inputDay').value = entry ? (entry.d||'') : '';
  document.getElementById('inputMethodText').value = '';

  const selMethod = entry ? entry.method : '';
  document.querySelectorAll('.method-btn').forEach(btn => {
    btn.className = 'method-btn';
    if (btn.dataset.method === selMethod) selectMethod(btn);
  });
  const presets = ['화상','출장','전시회','본사방문','기타'];
  if (selMethod && !presets.includes(selMethod)) document.getElementById('inputMethodText').value = selMethod;

  setDone(entry ? entry.done : true);
  document.getElementById('deleteBtn').style.display = modal.isNew ? 'none' : '';
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('inputDay').focus();
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function closeModalIfBg(e) { if (e.target===document.getElementById('modalOverlay')) closeModal(); }

function selectMethod(btn) {
  document.querySelectorAll('.method-btn').forEach(b => b.className='method-btn');
  const m = btn.dataset.method;
  const cls = m==='화상'?'sel-call':m==='출장'?'sel-visit':m==='전시회'?'sel-expo':m==='본사방문'?'sel-hq':'sel-other';
  btn.classList.add(cls);
  modal.selectedMethod = m;
  document.getElementById('inputMethodText').value = '';
}

function setDone(done) {
  modal.isDone = done;
  document.getElementById('btnDone').className = 'done-btn'+(done?' active-done':'');
  document.getElementById('btnPlan').className = 'done-btn'+(!done?' active-plan':'');
}

function saveMeeting() {
  if (isReadOnly) return;
  const co = data[currentRegion][modal.ci];
  if (!co.meetings[modal.year]) co.meetings[modal.year] = [];
  const day = document.getElementById('inputDay').value.trim();
  const methodText = document.getElementById('inputMethodText').value.trim();
  const method = methodText || modal.selectedMethod || '기타';
  const idx = co.meetings[modal.year].findIndex(m => m.m === modal.month);
  const entry = { m: modal.month, d: day, method, done: modal.isDone };
  if (idx >= 0) co.meetings[modal.year][idx] = entry;
  else co.meetings[modal.year].push(entry);
  closeModal(); render(); markChanged();
}

function deleteMeeting() {
  if (isReadOnly) return;
  const co = data[currentRegion][modal.ci];
  const arr = co.meetings[modal.year] || [];
  const idx = arr.findIndex(m => m.m === modal.month);
  if (idx >= 0) arr.splice(idx, 1);
  closeModal(); render(); markChanged();
}

function openNameEdit(ci) {
  if (isReadOnly) return;
  const co = data[currentRegion][ci];
  const n = prompt('거래처명 수정:', co.name);
  if (n && n !== co.name) { co.name = n; render(); markChanged(); }
}

function addCompany() {
  if (isReadOnly) return;
  const n = prompt('새 거래처명:');
  if (!n) return;
  data[currentRegion].push({ name: n, meetings: { [PREV_YEAR]: [], [CUR_YEAR]: [] } });
  render(); markChanged();
}

<style>@page{size:A4 landscape;}@media print{#printModal{display:none!important;}}</style>
<script>
function openPrintModal(){
  var cur=location.pathname.split('/').pop()||'salesfront.html';
  document.querySelectorAll('.print-page-cb').forEach(function(cb){cb.checked=(cb.value===cur);});
  updateSelectAllBtn();
  document.getElementById('printModal').style.display='flex';
}
function closePrintModal(){document.getElementById('printModal').style.display='none';}
function toggleSelectAll(){
  var cbs=document.querySelectorAll('.print-page-cb');
  var allChecked=Array.prototype.every.call(cbs,function(cb){return cb.checked;});
  Array.prototype.forEach.call(cbs,function(cb){cb.checked=!allChecked;});
  updateSelectAllBtn();
}
function updateSelectAllBtn(){
  var cbs=document.querySelectorAll('.print-page-cb');
  var allChecked=Array.prototype.every.call(cbs,function(cb){return cb.checked;});
  var btn=document.getElementById('selectAllBtn');
  if(btn) btn.textContent=allChecked?'전체 해제':'전체 선택';
}
function executePrint(){
  var selected=Array.prototype.map.call(document.querySelectorAll('.print-page-cb:checked'),function(cb){return cb.value;});
  if(!selected.length){alert('인쇄할 페이지를 선택하세요.');return;}
  closePrintModal();
  var base=location.href.split('?')[0].replace(/[^\/]+$/,'');
  var cur=location.pathname.split('/').pop()||'salesfront.html';
  if(selected.length===1){
    if(selected[0]===cur){window.print();}
    else{window.open(base+selected[0]+'?print=1','_blank');}
    return;
  }
  window.open(base+'print_merge.html?pages='+selected.join(','),'_blank');
}
</script>
